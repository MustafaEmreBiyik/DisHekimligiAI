[tool.pytest.ini_options]
# Run from the backend/ directory:  python -m pytest tests/ -v
# pythonpath = ["."] makes `app.*` and `db.*` imports work correctly.
pythonpath = ["."]
python_files = ["test_*.py"]
testpaths = ["tests"]
norecursedirs = [".git", ".venv", "venv", "__pycache__", ".pytest_runtime"]
addopts = "-ra --strict-markers -m \"not integration and not e2e\""
markers = [
  "integration: Tests that validate cross-module integration behavior and are opt-in.",
  "e2e: End-to-end tests that hit a running API/server and are opt-in.",
  "slow: Computationally heavy tests (IRT recovery, ML training) — run nightly, not on every PR.",
]
