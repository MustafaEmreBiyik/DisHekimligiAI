# Production Docker Compose with Nginx reverse proxy
# Usage: docker-compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: dentai-nginx
    ports:
      - "80:80"
      # Uncomment for HTTPS:
      # - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL certificates:
      # - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - dentai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - nginx
      - prod-nginx

  # Backend with production settings
  backend:
    environment:
      - DEVELOPMENT_MODE=false
      - WORKERS=4
    profiles:
      - prod-nginx

  # Frontend with production settings
  frontend:
    profiles:
      - prod-nginx

  # PostgreSQL remains the same
  postgres:
    profiles:
      - prod-nginx
      - postgres
