name: CI — Test, Type-check & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Python backend tests + coverage
  # ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DENTAI_SECRET_KEY: ci-secret-key-not-real
      GEMINI_API_KEY: ""          # intentionally empty; tests use mocks
      HUGGINGFACE_API_KEY: ""
      DATABASE_URL: "sqlite:///db/runtime/dentai_app.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements/requirements.txt
            backend/requirements/requirements-api.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/requirements.txt
          pip install -r requirements/requirements-api.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov=db \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 2: Frontend TypeScript type-check + ESLint
  # ─────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend — tsc + eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings 0

  # ─────────────────────────────────────────────────────────
  # JOB 3: Frontend unit tests (Vitest — S9-F)
  # Runs only when vitest config is present to allow gradual adoption
  # ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run Vitest
        run: npx vitest run --reporter=verbose
        continue-on-error: false
